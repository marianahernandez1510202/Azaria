<VirtualHost *:80>
    ServerName dtai.uteq.edu.mx
    ServerAlias www.dtai.uteq.edu.mx

    # Frontend (React build)
    DocumentRoot /var/www/azaria/frontend/build

    # Directiva para el frontend
    <Directory /var/www/azaria/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # React Router - redirigir todas las rutas a index.html
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api
        RewriteRule . /index.html [L]
    </Directory>

    # Backend API (PHP)
    Alias /api /var/www/azaria/backend/public

    <Directory /var/www/azaria/backend/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite para PHP router
        RewriteEngine On
        RewriteBase /api
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]
    </Directory>

    # CORS Headers
    <IfModule mod_headers.c>
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
    </IfModule>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/azaria_error.log
    CustomLog ${APACHE_LOG_DIR}/azaria_access.log combined

    # PHP configuration
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Security headers
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-XSS-Protection "1; mode=block"
    </IfModule>
</VirtualHost>

